name: Tests

on:

  push:

    branches:

      - main

      - master

  pull_request:

jobs:

  tests:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        php: [8.1,8.2,8.3,8.4]

    steps:

      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2

        with:

          php-version: ${{ matrix.php }}

          extensions: curl,json

      - run: composer install --no-interaction --prefer-dist

      - run: vendor/bin/phpunit